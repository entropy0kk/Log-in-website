<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Login website</title>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <link rel="stylesheet" href="style.css"/>
        <script src="https://kit.fontawesome.com/4a33d66118.js" crossorigin="anonymous"></script>
    </head>
    <body>
        <nav>
            <div class="navbar">
                <div class="navbar-left">
                    <img src="car.jpg" width="35px"/>
                </div>
                <div class="navbar-middle">
                    <a href="#">Home</a>
                    <a href="#">Purchase</a>
                </div>
                <div class="navbar-right">
                    <a href="#"><i class="fa-solid fa-language"></i></a>
                    <a href="#"><i class="fa-brands fa-discord"></i></a>
                    <a href="#"><button>Dashboard</button></a>
                </div>
            </div>
        </nav>
        <main>
            <div class="login-container">
                <div class="wrapper">
                    <div class="icon">
                        <i class="fa-solid fa-user-lock"></i>
                    </div>
                    <div class="login-info">
                        <h2>Log in to your account</h2>
                        <p>Please enter your credentials to continue</p>
                    </div>
                    <div class="input-wrap">
                        <form>
                            <div class="input-box">
                                <label>
                                    <p><i class="fa-regular fa-envelope"></i>Email address</p>
                                    <input type="text" placeholder="Examplemail@gmail.com" required>
                                </label>
                            </div>
                            <div class="input-box">
                                <label>
                                    <p><i class="fa-solid fa-lock"></i>Password</p>
                                    <input type="password" placeholder="Your password" required>
                                </label>
                            </div>
                        </form>
                    </div>
                    <div class="remember-forgot">
                        <label>
                            <input type="checkbox">
                            Remember me
                        </label>
                        <a href="#">Forgot password?</a>
                    </div>
                    <div class="log-in-btn">
                        <a href="#"><button>Log in</button></a>
                    </div>
                    <div class="reg">
                        <p>Don't have an account? <a href="#">Register</a></p>
                    </div>
                </div>
            </div>
        </main>

    </body>
</html>
